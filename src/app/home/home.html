<main class="home-main">
  <section class="hero">
    <div class="hero-content">
      <img src="/assets/einfachfischen.png" alt="EinfachFischen.ch - Angeln in der Schweiz" class="hero-logo">
      <p class="eyebrow">{{ prefs.t('heroEyebrow') }}</p>
      <h1 class="hero-main-text">{{ prefs.t('heroTitle') }}</h1>
      <p class="hero-subtitle">
        {{ prefs.t('heroSubtitle') }}
      </p>
      <button class="scroll-btn" (click)="scrollToMap()" aria-label="Zur interaktiven Karte der Angelgewässer scrollen">
        {{ prefs.t('toMap') }}
      </button>
    </div>
  </section>

  <section class="map-shell" #mapSection aria-label="Interaktive Karte der Schweizer Angelgewässer">
    @defer (on viewport; on timer(100ms)) {
      <app-map (loadFailed)="onMapLoadError()"></app-map>
    } @placeholder {
      <div class="map-placeholder">
        <div>
          <p>{{ prefs.t('mapLoading') }}</p>
          <p>{{ prefs.t('mapSubtitle') }}</p>
        </div>
      </div>
    }
  </section>
</main>
