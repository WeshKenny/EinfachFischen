<section class="lakes-page">
  <div class="lakes-card">
    <h1>{{ prefs.t('lakes') }}</h1>
    <div class="lakes-list">
      <a
        *ngFor="let lake of lakes"
        class="lake-link"
        [routerLink]="['/lake', lake.id]">
        <strong>{{ lake.name }}</strong>
        <span>{{ lake.cantons }}</span>
      </a>
    </div>
  </div>
</section>
